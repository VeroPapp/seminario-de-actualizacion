<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        input {
            height: 40px;
            font-size: 18px;
            text-align: right;
            padding-right: 10px;
        }

        button {
            width: 100%;
            height: 40px;
            font-size: 18px;
            color: white;
            border: none;
            box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }

        .btn-number { background-color: #498bba; }
        .btn-operator { background-color: #3fe134; }
        .btn-equals { background-color: #e79f48; }
        .btn-clear { background-color: #dd4848; }
    </style>
</head>

<body>

</body>

<script>
    class Calculator extends HTMLElement {

        constructor() {

            super(); //Inicializa la clase base, va siempre al principio

            // DISPLAY
            this.display = document.createElement('input');
            this.display.type = 'text';
            this.display.readOnly = true;
            this.display.id = 'display';

            // BOTONES
            this.btn0 = this.createBtn('0', 'btn-number');
            this.btn1 = this.createBtn('1', 'btn-number');
            this.btn2 = this.createBtn('2', 'btn-number');
            this.btn3 = this.createBtn('3', 'btn-number');
            this.btn4 = this.createBtn('4', 'btn-number');
            this.btn5 = this.createBtn('5', 'btn-number');
            this.btn6 = this.createBtn('6', 'btn-number');
            this.btn7 = this.createBtn('7', 'btn-number');
            this.btn8 = this.createBtn('8', 'btn-number');
            this.btn9 = this.createBtn('9', 'btn-number');

            this.btnDot = this.createBtn('.', 'btn-number');

            this.btnPlus = this.createBtn('+', 'btn-operator');
            this.btnMinus = this.createBtn('-', 'btn-operator');
            this.btnMult = this.createBtn('*', 'btn-operator');
            this.btnDiv = this.createBtn('/', 'btn-operator');

            this.btnEquals = this.createBtn('=', 'btn-equals');
            this.btnClear = this.createBtn('Borrar', 'btn-clear');

            // CONTENEDOR (para simular la tabla)
            this.container = document.createElement('div');
            this.container.style.display = "grid";
            this.container.style.gridTemplateColumns = "repeat(4, 1fr)";
            this.container.style.gap = "10px";
            this.container.style.width = "220px";
            this.container.style.margin = "20px auto";

            this.display.style.gridColumn = "span 4";
            this.btnClear.style.gridColumn = "span 4";

            // AGREGAR ELEMENTOS
            this.container.appendChild(this.display);

            [
                this.btn7, this.btn8, this.btn9, this.btnPlus,
                this.btn4, this.btn5, this.btn6, this.btnMinus,
                this.btn3, this.btn2, this.btn1, this.btnMult,
                this.btn0, this.btnDot, this.btnEquals, this.btnDiv,
                this.btnClear
            ].forEach(btn => this.container.appendChild(btn));

            this.appendChild(this.container);
        }

        // helper para crear botones
        createBtn(texto, clase) {
            const btn = document.createElement('button');
            btn.textContent = texto;
            btn.className = clase;
            return btn;
        }

        // FUNCIONES
        onBtn0Click() { this.display.value += '0'; }
        onBtn1Click() { this.display.value += '1'; }
        onBtn2Click() { this.display.value += '2'; }
        onBtn3Click() { this.display.value += '3'; }
        onBtn4Click() { this.display.value += '4'; }
        onBtn5Click() { this.display.value += '5'; }
        onBtn6Click() { this.display.value += '6'; }
        onBtn7Click() { this.display.value += '7'; }
        onBtn8Click() { this.display.value += '8'; }
        onBtn9Click() { this.display.value += '9'; }

        onBtnDotClick() { this.display.value += '.'; }

        onBtnPlusClick() { this.display.value += '+'; }
        onBtnMinusClick() { this.display.value += '-'; }
        onBtnMultiplyClick() { this.display.value += '*'; }
        onBtnDivisionClick() { this.display.value += '/'; }

        onBtnResultClick() {
            this.display.value = eval(this.display.value);
        }

        onBtnDeleteClick() {
            this.display.value = '';
        }

        connectedCallback() {
            console.log("Calculadora agregada al DOM");

            // NUMEROS
            this.btn0.onclick = () => this.onBtn0Click();
            this.btn1.onclick = () => this.onBtn1Click();
            this.btn2.onclick = () => this.onBtn2Click();
            this.btn3.onclick = () => this.onBtn3Click();
            this.btn4.onclick = () => this.onBtn4Click();
            this.btn5.onclick = () => this.onBtn5Click();
            this.btn6.onclick = () => this.onBtn6Click();
            this.btn7.onclick = () => this.onBtn7Click();
            this.btn8.onclick = () => this.onBtn8Click();
            this.btn9.onclick = () => this.onBtn9Click();

            // OPERACIONES
            this.btnDot.onclick = () => this.onBtnDotClick();
            this.btnPlus.onclick = () => this.onBtnPlusClick();
            this.btnMinus.onclick = () => this.onBtnMinusClick();
            this.btnMult.onclick = () => this.onBtnMultiplyClick();
            this.btnDiv.onclick = () => this.onBtnDivisionClick();

            // OTROS
            this.btnClear.onclick = () => this.onBtnDeleteClick();
            this.btnEquals.onclick = () => this.onBtnResultClick();
        }

        disconnectedCallback() {
            console.log("Calculadora removida del DOM");
        }
    }

    // registrar
    customElements.define('x-calculator', Calculator);

    function main() {
        const calc = new Calculator();
        document.body.appendChild(calc);
    }

    window.onload = main;
</script>

</html>
