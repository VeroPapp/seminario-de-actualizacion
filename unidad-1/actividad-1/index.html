<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        table {
            margin: 20px auto;
        }

        td {
            padding: 10px;
        }

        input {
            width: 100%;
            height: 40px;
            font-size: 18px;
            text-align: right;
            padding-right: 10px;
        }

        button {
            width: 100%;
            height: 40px;
            font-size: 18px;
            color: white;
            border: none;
            box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }

        .btn-number {
            background-color: #498bba;
        }

        .btn-operator {
            background-color: #3fe134;
        }

        .btn-equals {
            background-color: #e79f48;
        }

        .btn-clear {
            background-color: #dd4848;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td colspan="4">
                <input type="text" name="" id="display" readonly>
            </td>
        </tr>

        <tr>
            <td >
                <button class="btn-number" id="btn7">7</button>
            </td>
            <td >
                <button class="btn-number" id="btn8">8</button>
            </td>
            <td >
                <button class="btn-number" id="btn9">9</button>
            </td>
            <td >
                <button class="btn-operator" id="btnPlus">+</button>
            </td>
        </tr>

        <tr>
            <td>
                <button class="btn-number" id="btn4">4</button>
            </td>
            <td>
                <button class="btn-number" id="btn5">5</button>
            </td>
            <td>
                <button class="btn-number" id="btn6">6</button>
            </td>
            <td>
                <button class="btn-operator" id="btnMinus">-</button>
            </td>
        </tr>

        <tr>
            <td>
                <button class="btn-number" id="btn3">3</button>
            </td>
            <td>
                <button class="btn-number" id="btn2">2</button>
            </td>
            <td>
                <button class="btn-number" id="btn1">1</button>
            </td>
            <td>
                <button class="btn-operator" id="btnMult">*</button>
            </td>
        </tr>

        <tr>
            <td>
                <button class="btn-number" id="btn0">0</button>
            </td>
            <td>
                <button class="btn-number" id="btnDot">.</button>
            </td>
            <td>
                <button class="btn-equals" id="btnEquals">=</button>
            </td>
            <td>
                <button class="btn-operator" id="btnDiv">/</button>
            </td>
        </tr>

        <tr>
            <td colspan="4">
                <button class="btn-clear" id="btnClear">Borrar</button>
            </td>
        </tr>
    </table>

    <script>
        function onBtn0Click() {
            display.value += '0';
        }

        function onBtn1Click() {
            display.value += '1';
        }

        function onBtn2Click() {
            display.value += '2';
        }

        function onBtn3Click() {
            display.value += '3';
        }

        function onBtn4Click() {
            display.value += '4';
        }

        function onBtn5Click() {
            display.value += '5';
        }

        function onBtn6Click() {
            display.value += '6';
        }

        function onBtn7Click() {
            display.value += '7';
        }

        function onBtn8Click() {
            display.value += '8';
        }

        function onBtn9Click() {
            display.value += '9';
        }

        function onBtnDotClick() {
            display.value += '.';
        }

        function onBtnPlusClick() {
            display.value += '+';
        }

        function onBtnMinusClick() {
            display.value += '-';
        }

        function onBtnMultiplyClick() {
            display.value += '*';
        }

        function onBtnDivisionClick() {
            display.value += '/';
        }

        function onBtnResultClick() {
            display.value = eval( display.value );
        }

        function onBtnDeleteClick() {
            display.value = '';
        }

        function main() {
            //Botones numéricos
            btn0.onclick = onBtn0Click;
            btn1.onclick = onBtn1Click;
            btn2.onclick = onBtn2Click;
            btn3.onclick = onBtn3Click;
            btn4.onclick = onBtn4Click;
            btn5.onclick = onBtn5Click;
            btn6.onclick = onBtn6Click;
            btn7.onclick = onBtn7Click;
            btn8.onclick = onBtn8Click;
            btn9.onclick = onBtn9Click;

            //Botones de operación
            btnDot.onclick = onBtnDotClick;
            btnPlus.onclick = onBtnPlusClick;
            btnMinus.onclick = onBtnMinusClick;
            btnMult.onclick = onBtnMultiplyClick;
            btnDiv.onclick = onBtnDivisionClick;
            btnClear.onclick = onBtnDeleteClick;

            //Resultado
            btnEquals.onclick = onBtnResultClick;
        }

        window.onload = main;
    </script>
</body>
</html>
