<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        table {
            margin: 20px auto;
        }

        td {
            padding: 10px;
        }

        input {
            width: 100%;
            height: 40px;
            font-size: 18px;
            text-align: right;
            padding-right: 10px;
        }

        button {
            width: 100%;
            height: 40px;
            font-size: 18px;
            color: white;
            border: none;
            box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }

        .btn-number {
            background-color: #498bba;
        }

        .btn-operator {
            background-color: #3fe134;
        }

        .btn-equals {
            background-color: #e79f48;
        }

        .btn-clear {
            background-color: #dd4848;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <td colspan="4">
                <input type="text" name="" id="screen" readonly>
            </td>
        </tr>

        <tr>
            <td >
                <button class="btn-number">7</button>
            </td>
            <td >
                <button class="btn-number">8</button>
            </td>
            <td >
                <button class="btn-number">9</button>
            </td>
            <td >
                <button class="btn-operator">+</button>
            </td>
        </tr>

        <tr>
            <td>
                <button class="btn-number">4</button>
            </td>
            <td>
                <button class="btn-number">5</button>
            </td>
            <td>
                <button class="btn-number">6</button>
            </td>
            <td>
                <button class="btn-operator">-</button>
            </td>
        </tr>

        <tr>
            <td>
                <button class="btn-number">3</button>
            </td>
            <td>
                <button class="btn-number">2</button>
            </td>
            <td>
                <button class="btn-number">1</button>
            </td>
            <td>
                <button class="btn-operator">*</button>
            </td>
        </tr>

        <tr>
            <td>
                <button class="btn-number">0</button>
            </td>
            <td>
                <button class="btn-number">.</button>
            </td>
            <td>
                <button class="btn-equals">=</button>
            </td>
            <td>
                <button class="btn-operator">/</button>
            </td>
        </tr>

        <tr>
            <td colspan="4">
                <button class="btn-clear">Borrar</button>
            </td>
        </tr>
    </table>

    <script>
        const screen = document.getElementById("screen");
        const btn = document.querySelectorAll("button");

        btn.forEach(btn => {
            btn.addEventListener("click", () => {

                const btn_content = btn.textContent;

                if (btn_content === "=") {
                    screen.value = eval(screen.value);
                } else if (btn_content === "Borrar") {
                    screen.value = "";
                } else {
                    const operators = ["+", "-", "*", "/", "."];
                    const last = screen.value.slice(-1);

                    if (operators.includes(btn_content) && operators.includes(last)) {
                        return;
                    } else {
                        screen.value += btn_content;
                    }
                }
            });

        });
    </script>
</body>
</html>
